# Default Design Tokens
# Sensible defaults used by @design-system-builder when project docs
# do not specify brand-specific values.
# Override by setting values in prototype-spec.yaml → design_tokens
# or by extracting specific values during *analyze.

# -----------------------------------------------------------------------
# COLORS
# -----------------------------------------------------------------------

colors:
  # Blue — default primary (neutral, professional, trustworthy)
  primary:
    "50":  "#EFF6FF"
    "100": "#DBEAFE"
    "200": "#BFDBFE"
    "300": "#93C5FD"
    "400": "#60A5FA"
    "500": "#3B82F6"    # main
    "600": "#2563EB"    # hover
    "700": "#1D4ED8"    # active / dark text
    "800": "#1E40AF"
    "900": "#1E3A8A"

  # Gray — neutral palette
  neutral:
    "50":  "#F9FAFB"    # page background
    "100": "#F3F4F6"    # surface, table stripes
    "200": "#E5E7EB"    # borders, dividers
    "300": "#D1D5DB"    # input borders default
    "400": "#9CA3AF"    # placeholder text, disabled
    "500": "#6B7280"    # secondary text
    "600": "#4B5563"    # body text
    "700": "#374151"
    "800": "#1F2937"    # heading text
    "900": "#111827"    # primary text

  # Semantic colors
  semantic:
    success:
      light: "#D1FAE5"
      main:  "#10B981"
      dark:  "#065F46"
    warning:
      light: "#FEF3C7"
      main:  "#F59E0B"
      dark:  "#92400E"
    error:
      light: "#FEE2E2"
      main:  "#EF4444"
      dark:  "#991B1B"
    info:
      light: "#DBEAFE"
      main:  "#3B82F6"
      dark:  "#1E3A8A"

  # Surface colors
  surface:
    background:    "#F9FAFB"    # neutral-50
    surface:       "#FFFFFF"    # white
    surface_raised: "#FFFFFF"   # cards, modals
    border:        "#E5E7EB"    # neutral-200
    border_subtle: "#F3F4F6"    # neutral-100

  # Text colors
  text:
    primary:   "#111827"    # neutral-900
    secondary: "#6B7280"    # neutral-500
    disabled:  "#9CA3AF"    # neutral-400
    inverse:   "#FFFFFF"    # on dark backgrounds
    link:      "#2563EB"    # primary-600
    error:     "#EF4444"    # semantic.error.main

# -----------------------------------------------------------------------
# TYPOGRAPHY
# -----------------------------------------------------------------------

typography:
  font_family:
    sans: "Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    mono: "'JetBrains Mono', 'Fira Code', monospace"

  scale:
    # Headings
    h1: { size: 32, weight: 700, line_height: 1.25, letter_spacing: -0.02 }
    h2: { size: 24, weight: 700, line_height: 1.30, letter_spacing: -0.01 }
    h3: { size: 20, weight: 600, line_height: 1.30, letter_spacing: 0 }
    h4: { size: 18, weight: 600, line_height: 1.40, letter_spacing: 0 }

    # Body
    body_lg:  { size: 18, weight: 400, line_height: 1.60, letter_spacing: 0 }
    body_md:  { size: 16, weight: 400, line_height: 1.60, letter_spacing: 0 }
    body_sm:  { size: 14, weight: 400, line_height: 1.50, letter_spacing: 0 }

    # Labels (medium weight for UI chrome)
    label_md: { size: 14, weight: 500, line_height: 1.40, letter_spacing: 0 }
    label_sm: { size: 12, weight: 500, line_height: 1.40, letter_spacing: 0.01 }

    # Caption
    caption:  { size: 12, weight: 400, line_height: 1.40, letter_spacing: 0.01 }

# -----------------------------------------------------------------------
# SPACING
# -----------------------------------------------------------------------

spacing:
  base: 4    # all values are multiples of 4px

  scale:
    "1":  4
    "2":  8
    "3":  12
    "4":  16
    "5":  20
    "6":  24
    "8":  32
    "10": 40
    "12": 48
    "16": 64
    "20": 80
    "24": 96

  # Semantic spacing aliases
  semantic:
    component_padding:    16    # default internal padding for cards, inputs
    component_gap:        8     # gap between elements within a component
    section_gap:          48    # gap between major page sections
    form_field_gap:       16    # gap between form fields
    button_padding_x:     16
    button_padding_y:     8
    input_padding_x:      12
    input_padding_y:      10
    card_padding:         24
    modal_padding:        32
    navbar_height:        64
    sidebar_width:        240
    sidebar_collapsed:    64

# -----------------------------------------------------------------------
# BORDER RADIUS
# -----------------------------------------------------------------------

border_radius:
  none: 0
  sm:   4     # inputs, badges, small elements
  md:   8     # cards, panels, dropdowns
  lg:   12    # modals, large cards
  xl:   16    # feature cards, hero elements
  full: 9999  # pills, avatars, toggle switches

# -----------------------------------------------------------------------
# SHADOWS
# -----------------------------------------------------------------------

shadows:
  none:   "none"
  sm:     "0 1px 2px 0 rgba(0, 0, 0, 0.05)"
  md:     "0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)"
  lg:     "0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05)"
  xl:     "0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04)"

# -----------------------------------------------------------------------
# TRANSITIONS
# -----------------------------------------------------------------------

transitions:
  duration:
    fast:    150    # hover states, color changes
    normal:  200    # most UI transitions
    slow:    300    # modals, drawers, page transitions

  easing:
    ease:         "ease"
    ease_in:      "ease-in"
    ease_out:     "ease-out"
    ease_in_out:  "ease-in-out"
    spring:       "cubic-bezier(0.34, 1.56, 0.64, 1)"    # subtle bounce

# -----------------------------------------------------------------------
# BREAKPOINTS (for responsive notes in prototypes)
# -----------------------------------------------------------------------

breakpoints:
  mobile:  375     # prototype at 375×812
  tablet:  768     # prototype at 768×1024
  desktop: 1440    # prototype at 1440×900
